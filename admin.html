<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Amber & Oak</title>
    <link rel="stylesheet" href="./client/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 font-sans text-stone-800">

    <div class="max-w-6xl mx-auto p-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-serif text-amber-900">Amber & Oak Reservations</h1>
            <a href="/" class="text-sm text-stone-500 hover:text-amber-700 underline">Back to Main Site</a>
        </div>

        <div class="bg-white shadow-md rounded-lg overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-amber-900 text-white">
                        <th class="p-4 font-semibold">Date</th>
                        <th class="p-4 font-semibold">Customer Name</th>
                        <th class="p-4 font-semibold">Contact</th>
                        <th class="p-4 font-semibold">Guests</th>
                        <th class="p-4 font-semibold">Status</th>
                        <th class="p-4 font-semibold text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="reservations-table-body" class="divide-y divide-stone-200">
                    <tr>
                        <td colspan="6" class="p-4 text-center text-stone-500">Loading reservations...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module" src="./client/js/admin.js"></script>
</body>
</html>
