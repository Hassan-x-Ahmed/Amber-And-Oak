<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Amber & Oak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-stone-100 font-sans text-stone-800 flex h-screen overflow-hidden">

    <aside class="w-64 bg-stone-900 text-stone-300 flex flex-col hidden md:flex">
        <div class="p-6 border-b border-stone-800">
            <h1 class="font-serif text-2xl font-bold text-amber-500 tracking-wider">Amber & Oak</h1>
            <p class="text-[10px] uppercase tracking-[0.2em] mt-1 text-stone-500">Management Portal</p>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="#" class="flex items-center gap-3 bg-amber-800/20 text-amber-400 px-4 py-3 rounded-md transition border border-amber-800/30">
                <i class="fa-solid fa-book-open"></i> Reservations
            </a>
            <a href="/" class="flex items-center gap-3 hover:bg-stone-800 px-4 py-3 rounded-md transition">
                <i class="fa-solid fa-globe"></i> View Live Site
            </a>
        </nav>
        <div class="p-4 border-t border-stone-800 text-xs text-stone-500">
            Logged in as: Manager
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-stone-50">
        <header class="bg-white border-b border-stone-200 px-8 py-6 flex justify-between items-center">
            <h2 class="text-2xl font-serif font-bold text-stone-800">Upcoming Reservations</h2>
            <button onclick="fetchReservations()" class="text-sm font-medium text-stone-500 hover:text-amber-700 transition flex items-center gap-2">
                <i class="fa-solid fa-rotate-right"></i> Refresh Data
            </button>
        </header>

        <div class="flex-1 overflow-auto p-8">
            <div class="bg-white rounded-lg shadow-sm border border-stone-200 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-stone-100 border-b border-stone-200 text-xs uppercase tracking-wider text-stone-500">
                            <th class="p-4 font-bold">Token</th>
                            <th class="p-4 font-bold">Guest Info</th>
                            <th class="p-4 font-bold">Date & Time</th>
                            <th class="p-4 font-bold">Party Size</th>
                            <th class="p-4 font-bold">Status</th>
                            <th class="p-4 font-bold text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="reservations-table-body" class="divide-y divide-stone-100">
                        <tr>
                            <td colspan="6" class="p-8 text-center text-stone-400">
                                <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i>
                                <p>Loading reservations...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="./client/js/admin.js"></script>
</body>
</html>
